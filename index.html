<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loxsav — LOXAM Module</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C8102E">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="jspdf.umd.min.js"></script>
<style>

:root{
  --red:#C8102E;
  --red-dark:#8F0C21;
  --red-tint:#FDECEE;
  --paper:#F5F6F8;
  --card:#FFFFFF;
  --line:#DCE1E8;
  --ink:#111827;
  --sub:#5B6472;
  --neuf:#1E9E5A;
  --avec-reserve:#C6362E;
  --gold:#E8A812;
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--paper); color:var(--ink); -webkit-tap-highlight-color:transparent;
}
input, textarea, select, button, label, p, h1, h2, h3, div, span {
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
header{
  position:sticky; top:0; z-index:50; background:var(--card);
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:10px 14px; border-bottom:1px solid var(--line);
}
.topbar img{height:34px; display:block;}
.topbar .agence{font-size:9.5px; color:var(--sub); font-weight:700; letter-spacing:.3px; margin-top:2px;}
.topbar .title{font-size:13.5px; font-weight:800; color:var(--red); text-align:right; letter-spacing:.2px;}
.accent-strip{
  background:var(--red); height:20px; margin-top:8px;
  box-shadow:0 2px 5px rgba(200,16,46,.25);
}

main{padding:14px 12px 130px; max-width:680px; margin:0 auto;}
section.card{
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  padding:14px; margin-bottom:14px;
}
section.card h2{font-size:15px; margin:0 0 4px; color:var(--red);}
section.card p.hint{font-size:12px; color:var(--sub); margin:0 0 12px;}

.field{margin-bottom:12px;}
.field:last-child{margin-bottom:0;}
.field label{display:block; font-size:12.5px; font-weight:600; color:var(--sub); margin-bottom:4px;}
.field input[type=text], .field input[type=date], .field textarea, .field select{
  width:100%; min-width:0; max-width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 11px;
  font-size:15px; font-family:inherit; background:#fff; color:var(--ink);
  -webkit-appearance:none; appearance:none;
}
.field input[type=date]{ display:block; min-height:46px; }
input::-webkit-date-and-time-value{ text-align:left; }
.field textarea{resize:vertical; min-height:150px; line-height:1.5;}
.info-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px 12px; align-items:start;}
.info-grid .field{margin-bottom:0; min-width:0;}

/* Ligne label + bouton géoloc */
.label-row{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px;}
.label-row .lbl{font-size:12.5px; font-weight:600; color:var(--sub);}
.geo-btn{
  display:inline-flex; align-items:center; gap:5px; cursor:pointer;
  background:#fff; color:var(--red); border:1px solid var(--line); border-radius:9px;
  padding:5px 9px; font-size:11.5px; font-weight:700; line-height:1;
}
.geo-btn:active{background:var(--red-tint);}
.geo-btn svg{display:block;}
.geo-btn.loading{opacity:.6; pointer-events:none;}

/* Photos */
.photo-actions{display:flex; gap:8px; flex-wrap:wrap;}
.btn-photo{
  flex:1; min-width:135px; cursor:pointer; background:var(--red); color:#fff; border:none;
  border-radius:10px; padding:11px; font-size:13.5px; font-weight:700;
}
.btn-photo.ghost{background:#EEF0F3; color:var(--red-dark);}
.photo-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px;}
.photo-thumb{position:relative; aspect-ratio:1/1; border-radius:10px; overflow:hidden; border:1px solid var(--line); background:#F0F1F4;}
.photo-thumb img{width:100%; height:100%; object-fit:cover; display:block;}
.photo-del{
  position:absolute; top:4px; right:4px; width:24px; height:24px; border-radius:50%;
  border:none; background:rgba(17,24,39,.72); color:#fff; font-size:12px; line-height:1; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* Signatures */
.sig-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.sig-cell{border:1px solid var(--line); border-radius:10px; padding:10px;}
.sig-cell .sig-label{font-size:11.5px; font-weight:700; color:var(--sub); margin-bottom:8px;}
.sig-canvas{width:100%; height:130px; border:1.5px dashed var(--line); border-radius:8px; background:#fff; touch-action:none; display:block; -ms-touch-action:none;}
.sig-clear{margin-top:6px; cursor:pointer; background:#EEF0F3; color:var(--red-dark); border:none; border-radius:8px; padding:7px 10px; font-size:12px; font-weight:600;}
@media (max-width:560px){ .sig-grid{grid-template-columns:1fr;} }

.sticky-footer{
  position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom)); display:flex; gap:8px; z-index:60;
  box-shadow:0 -2px 10px rgba(0,0,0,.06); max-width:680px; margin:0 auto;
}
.btn{
  flex:1; cursor:pointer; padding:13px; border:none; border-radius:10px; font-size:14.5px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.btn-primary{background:var(--red); color:#fff;}
.btn-ghost{background:#EEF0F3; color:var(--red-dark);}
.btn-danger-ghost{background:var(--red-tint); color:var(--avec-reserve); flex:0 0 auto; padding:13px 16px;}
.btn-icon{flex:0 0 54px;}

#toast{
  position:fixed; bottom:82px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--red-dark); color:#fff; padding:9px 16px; border-radius:999px; font-size:13px;
  opacity:0; pointer-events:none; transition:all .25s; z-index:80; max-width:88%; text-align:center;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.modal-overlay{
  position:fixed; inset:0; background:rgba(17,24,39,.55); z-index:100;
  display:none; align-items:center; justify-content:center; padding:24px;
}
.modal-overlay.show{display:flex;}
.modal-card{
  background:#fff; border-radius:16px; padding:20px; max-width:340px; width:100%;
  box-shadow:0 12px 40px rgba(0,0,0,.25);
}
.modal-card h3{margin:0 0 8px; font-size:16px; color:var(--ink);}
.modal-card p{margin:0 0 18px; font-size:13.5px; color:var(--sub); line-height:1.5;}
.modal-actions{display:flex; gap:10px;}
.modal-actions button{
  flex:1; cursor:pointer; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:700;
}
.modal-actions .cancel{background:#EEF0F3; color:var(--ink);}
.modal-actions .danger{background:var(--red); color:#fff;}

</style>
</head>

<script>

/* ===== Helper DOM (repris de Loxcheck / Loxdevis) ===== */
function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  if (attrs === null || typeof attrs !== 'object' || attrs.nodeType || Array.isArray(attrs)) {
    if (attrs !== null && attrs !== undefined) children.unshift(attrs);
    attrs = {};
  }
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='html') e.innerHTML=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if(v!==undefined && v!==null) e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{ if(c!=null) e.append(c.nodeType?c:document.createTextNode(c)); });
  return e;
}
function field(label, control){
  return el('div',{class:'field'}, el('label', label), control);
}
function inp(type, value, oninput, placeholder){
  const attrs = {type, value: value==null?'':value, oninput:e=>{ oninput(e.target.value); }};
  if(placeholder) attrs.placeholder = placeholder;
  return el('input', attrs);
}

/* ===== Icône géoloc (style "me localiser" Google Maps) ===== */
const GEO_SVG = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><line x1="12" y1="1.6" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22.4"/><line x1="1.6" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22.4" y2="12"/></svg>';

/* ===== Constantes (reprises de Loxcheck) ===== */
const SOUS_TRAITANTS = ['CRPS','TCPP','TERMICLIM','CC BAT','EMS','JM CARTIER'];

/* ===== État ===== */
const STORAGE_KEY = 'loxsav-draft';
const state = {
  client:'', adresse:'', km:'', soustraitant:'', soustraitantAutre:'',
  dateInter:'', affaire:'', observations:'', nomTech:'',
  photos:[], sigClient:null, sigTech:null, lat:null, lng:null
};

/* ===== Helpers ===== */
function todayISO(){ return new Date().toISOString().slice(0,10); }
function frDate(iso){ return iso ? iso.split('-').reverse().join('/') : ''; }
function soustraitantValue(){ return state.soustraitant === '__autre' ? (state.soustraitantAutre||'') : (state.soustraitant||''); }

let toastTimer=null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ /* quota (photos volumineuses) : session OK */ } }
function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){ try{ Object.assign(state, JSON.parse(raw)); }catch(e){} }
  if(!Array.isArray(state.photos)) state.photos = [];
  if(!state.dateInter) state.dateInter = todayISO();
}

/* ===== Géolocalisation → adresse auto (reverse geocoding OSM) ===== */
function geolocate(btn){
  if(!navigator.geolocation){ showToast('Géolocalisation non disponible'); return; }
  if(btn) btn.classList.add('loading');
  showToast('Localisation en cours…');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    state.lat = lat; state.lng = lon;
    let addr = lat.toFixed(5)+', '+lon.toFixed(5);
    try{
      const r = await fetch('https://nominatim.openstreetmap.org/reverse?format=jsonv2&addressdetails=1&lat='+lat+'&lon='+lon, {headers:{'Accept':'application/json'}});
      const d = await r.json();
      const a = d.address || {};
      const rue = [a.house_number, a.road].filter(Boolean).join(' ');
      const ville = [a.postcode, a.city||a.town||a.village||a.municipality].filter(Boolean).join(' ');
      const line = [rue, ville].filter(Boolean).join(', ');
      if(line) addr = line; else if(d.display_name) addr = d.display_name;
    }catch(e){ /* hors ligne : on garde les coordonnées */ }
    state.adresse = addr; save(); render(); showToast('Adresse renseignée ✓');
  }, err=>{
    if(btn) btn.classList.remove('loading');
    showToast(err.code===1 ? 'Localisation refusée' : 'Localisation indisponible');
  }, {enableHighAccuracy:true, timeout:12000, maximumAge:0});
}

/* ===== Photos (compression + annexe) ===== */
function compressImage(file, maxDim=1400, quality=0.72){
  return new Promise((resolve,reject)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      let w = img.naturalWidth, h = img.naturalHeight;
      const scale = Math.min(1, maxDim/Math.max(w,h));
      w = Math.round(w*scale); h = Math.round(h*scale);
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve({ data:c.toDataURL('image/jpeg', quality), w, h });
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('img')); };
    img.src = url;
  });
}
async function handleFiles(fileList){
  const files = [...(fileList||[])].filter(f=>f && f.type && f.type.startsWith('image/'));
  if(!files.length) return;
  showToast('Ajout photo…');
  for(const f of files){ try{ state.photos.push(await compressImage(f)); }catch(e){} }
  save(); render(); showToast(state.photos.length+' photo(s) en annexe');
}

/* ===== Signature (souris + tactile) ===== */
const pads = {};
function initPad(canvas, key){
  const ctx = canvas.getContext('2d');
  let drawing=false, hasInk=false, last=null;
  function resize(){
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if(!rect.width) return;
    const prev = hasInk ? canvas.toDataURL() : (state[key]||null);
    canvas.width = Math.round(rect.width*ratio);
    canvas.height = Math.round(rect.height*ratio);
    ctx.setTransform(ratio,0,0,ratio,0,0);
    ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#111827';
    if(prev){ const img=new Image(); img.onload=()=>{ ctx.drawImage(img,0,0,rect.width,rect.height); }; img.src=prev; hasInk=true; }
  }
  function getPos(e){
    const r = canvas.getBoundingClientRect();
    const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
    return { x:t.clientX-r.left, y:t.clientY-r.top };
  }
  function start(e){ e.preventDefault(); drawing=true; last=getPos(e); }
  function move(e){ if(!drawing) return; e.preventDefault(); const p=getPos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; hasInk=true; }
  function end(){ if(drawing){ drawing=false; state[key]=canvas.toDataURL('image/png'); save(); } }
  // Souris
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  // Tactile (le toucher pour signer)
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end, {passive:false});
  canvas.addEventListener('touchcancel', end, {passive:false});
  setTimeout(resize, 30);
  window.addEventListener('resize', ()=>setTimeout(resize, 60));
  pads[key] = { clear:()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); hasInk=false; state[key]=null; save(); } };
}

/* ===== Rendu ===== */
function render(){
  const root = document.getElementById('sections');
  root.innerHTML = '';

  // Informations
  const info = el('section',{class:'card'}, el('h2','Informations'));
  info.append(field('Client', inp('text', state.client, v=>{state.client=v; save();}, 'Nom du client')));

  // Adresse + bouton géoloc
  const geoBtn = el('button',{class:'geo-btn', title:'Renseigner via ma position', onclick:e=>geolocate(e.currentTarget)},
                    el('span',{html:GEO_SVG}), 'Localiser');
  const addrRow = el('div',{class:'label-row'}, el('span',{class:'lbl'}, "Adresse d'intervention"), geoBtn);
  const addrInput = inp('text', state.adresse, v=>{state.adresse=v; save();}, "Adresse du site (ou géoloc.)");
  info.append(el('div',{class:'field'}, addrRow, addrInput));

  // Km
  const kmInput = inp('text', state.km, v=>{ state.km=v.replace(/[^0-9.,]/g,''); save(); }, 'Ex : 45');
  kmInput.setAttribute('inputmode','decimal');
  info.append(field('Km parcourus', kmInput));

  // Sous-traitant
  const sel = el('select',{onchange:e=>{ state.soustraitant=e.target.value; save(); render(); }});
  sel.append(el('option',{value:''},'— Sous-traitant —'));
  SOUS_TRAITANTS.forEach(s=> sel.append(el('option', state.soustraitant===s?{value:s,selected:'selected'}:{value:s}, s)));
  sel.append(el('option', state.soustraitant==='__autre'?{value:'__autre',selected:'selected'}:{value:'__autre'},'Autre…'));
  info.append(field('Sous-traitant', sel));
  if(state.soustraitant==='__autre'){
    info.append(field('Préciser le sous-traitant', inp('text', state.soustraitantAutre, v=>{state.soustraitantAutre=v; save();}, 'Nom du sous-traitant')));
  }

  const grid = el('div',{class:'info-grid'});
  grid.append(field("Date d'intervention", inp('date', state.dateInter, v=>{state.dateInter=v; save();})));
  grid.append(field('N° affaire / contrat', inp('text', state.affaire, v=>{state.affaire=v; save();}, 'N°…')));
  info.append(grid);
  root.append(info);

  // Observations
  const obs = el('section',{class:'card'}, el('h2','Observations'));
  const ta = el('textarea',{placeholder:"Décrire l'intervention, les constats, les actions réalisées, les réserves…", oninput:e=>{ state.observations=e.target.value; save(); }}, state.observations||'');
  obs.append(el('div',{class:'field'}, ta));
  root.append(obs);

  // Photos (annexe)
  const pc = el('section',{class:'card'}, el('h2','Photos (annexe)'));
  const camInput = el('input',{type:'file', accept:'image/*', capture:'environment', style:'display:none', onchange:e=>{ handleFiles(e.target.files); e.target.value=''; }});
  const actions = el('div',{class:'photo-actions'},
    el('button',{class:'btn-photo', onclick:()=>camInput.click()},'📷 Prendre une photo'),
    camInput
  );
  pc.append(actions);
  if(state.photos.length){
    const g = el('div',{class:'photo-grid'});
    state.photos.forEach((p,i)=>{
      g.append(el('div',{class:'photo-thumb'},
        el('img',{src:p.data, alt:'photo '+(i+1)}),
        el('button',{class:'photo-del', title:'Supprimer', onclick:()=>{ state.photos.splice(i,1); save(); render(); }},'✕')
      ));
    });
    pc.append(g);
  }else{
    pc.append(el('p',{class:'hint', style:'margin:10px 0 0;'},'Aucune photo. Les photos ajoutées seront jointes en annexe du PDF (une par page).'));
  }
  root.append(pc);

  // Signatures
  const sig = el('section',{class:'card'}, el('h2','Signatures'));
  const sgrid = el('div',{class:'sig-grid'});
  const cClient = el('canvas',{class:'sig-canvas'});
  const cTech = el('canvas',{class:'sig-canvas'});
  sgrid.append(el('div',{class:'sig-cell'},
    el('div',{class:'sig-label'},'Signature du client'), cClient,
    el('button',{class:'sig-clear', onclick:()=>pads.sigClient.clear()},'Effacer')
  ));
  sgrid.append(el('div',{class:'sig-cell'},
    el('div',{class:'sig-label'},'Signature du technicien SAV'), cTech,
    el('button',{class:'sig-clear', onclick:()=>pads.sigTech.clear()},'Effacer')
  ));
  sig.append(sgrid);
  sig.append(field('Nom du technicien SAV', inp('text', state.nomTech, v=>{state.nomTech=v; save();}, 'Nom / prénom')));
  root.append(sig);

  initPad(cClient,'sigClient');
  initPad(cTech,'sigTech');
}

/* ===== Pied de page légal (mention obligatoire, réutilisable) ===== */
const MENTION_LEGALE = "LOXAM MODULE – S.A.S.U. CAPITAL DE 222 559 930 €- SIEGE SOCIAL : 276, RUE NICOLAS COATANLEM – 56850 CAUDAN – R.C.S. LORIENT B 433 911 948 – N° T.V.A : FR27 433 911 948 – NAF 7732Z";
function drawLegalFooter(doc){
  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const total = doc.internal.getNumberOfPages();
  doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(150,155,162);
  const lines = doc.splitTextToSize(MENTION_LEGALE, PW-2*48);
  for(let p=1;p<=total;p++){ doc.setPage(p); doc.text(lines, PW/2, PH-26, {align:'center', lineHeightFactor:1.35}); }
}

/* ===== Génération PDF (style maison — REDD / WARMB / WARMF, calqué Loxdevis) ===== */
async function generateRapportPDF(){
  const jsPDF = await ensureJsPDF();
  if(!jsPDF){ showToast('Lib PDF non chargée — réessaie (connecté)'); return; }
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 48;
  const REDD=[200,16,46], WARMB=[219,212,201], WARMF=[250,246,240], INK=[17,24,39], SUB=[90,100,114];

  // Logo
  try{ doc.addImage(document.querySelector('.topbar img').src, 'PNG', M, 40, 116, 44); }catch(e){}

  // Badge rouge (haut droite)
  doc.setFillColor.apply(doc, REDD); doc.roundedRect(W-M-150, 40, 150, 32, 9, 9, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(255);
  doc.text('RAPPORT SAV', W-M-75, 61, {align:'center'});

  // Tableau infos (cadre arrondi, uniforme comme les autres blocs)
  const kmTxt = state.km ? (String(state.km).replace('.',',')+' km') : '';
  const rows = [
    ['Client', state.client||''],
    ["Adresse d'intervention", state.adresse||''],
    ['Km parcourus', kmTxt],
    ['Sous-traitant', soustraitantValue()],
    ["Date d'intervention", frDate(state.dateInter)],
    ['N° affaire / contrat', state.affaire||'']
  ];
  const rh = 24, nR = rows.length, tW = W-2*M, labelW = 160, valX = M+labelW, rad = 8;
  const tX = M, tY = 100, tH = nR*rh;
  doc.setFillColor.apply(doc, WARMF); doc.setDrawColor.apply(doc, WARMB); doc.setLineWidth(0.9);
  doc.roundedRect(tX, tY, tW, tH, rad, rad, 'FD');
  doc.setDrawColor.apply(doc, WARMB); doc.setLineWidth(0.7);
  doc.line(valX, tY+2, valX, tY+tH-2);
  for(let i=1;i<nR;i++){ doc.line(tX+2, tY+i*rh, tX+tW-2, tY+i*rh); }
  doc.setFontSize(10);
  rows.forEach((r,i)=>{
    const cy = tY + i*rh + rh/2 + 3.3;
    doc.setFont('helvetica','bold'); doc.setTextColor.apply(doc, REDD);
    doc.text(r[0], tX+10, cy);
    doc.setFont('helvetica','normal'); doc.setTextColor.apply(doc, INK);
    const v = doc.splitTextToSize(String(r[1]), tW-labelW-18);
    doc.text(v.length?v[0]:'', valX+8, cy);
  });
  let y = tY + tH + 22;

  // Observations
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor.apply(doc, REDD);
  doc.text('Observations :', M, y);
  y += 10;
  const obsTop = y, obsBottom = 596;
  doc.setFillColor.apply(doc, WARMF); doc.setDrawColor.apply(doc, WARMB); doc.setLineWidth(0.9);
  doc.roundedRect(M, obsTop, W-2*M, obsBottom-obsTop, 8, 8, 'FD');
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor.apply(doc, INK);
  const lh = 14.5;
  const maxLines = Math.floor((obsBottom-obsTop-24)/lh);
  let obsLines = doc.splitTextToSize(state.observations||'', W-2*M-20);
  if(obsLines.length > maxLines){ obsLines = obsLines.slice(0, maxLines); obsLines[maxLines-1]=(obsLines[maxLines-1]||'').slice(0,-1)+'…'; }
  doc.text(obsLines, M+10, obsTop+18, {lineHeightFactor:1.5});

  // Signatures
  let sy = obsBottom + 26;
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor.apply(doc, INK);
  doc.text('Date : ' + frDate(todayISO()), M, sy);
  sy += 12;
  const boxW = (W-2*M-24)/2, boxH = 72;
  const leftX = M, rightX = M+boxW+24;
  doc.setDrawColor.apply(doc, WARMB); doc.setLineWidth(0.9); doc.setFillColor.apply(doc, WARMF);
  doc.roundedRect(leftX, sy, boxW, boxH, 8, 8, 'FD');
  doc.roundedRect(rightX, sy, boxW, boxH, 8, 8, 'FD');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor.apply(doc, REDD);
  doc.text('Signature du client', leftX+8, sy+14);
  doc.text('Signature du technicien SAV', rightX+8, sy+14);
  if(state.sigClient){ try{ doc.addImage(state.sigClient,'PNG', leftX+10, sy+18, boxW-20, boxH-26);}catch(e){} }
  if(state.sigTech){ try{ doc.addImage(state.sigTech,'PNG', rightX+10, sy+18, boxW-20, boxH-26);}catch(e){} }
  if(state.nomTech){ doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor.apply(doc, SUB); doc.text(String(state.nomTech), rightX+8, sy+boxH+14); }

  // Annexe photos — empilées à la suite (nouvelle page si débordement)
  if(state.photos && state.photos.length){
    const availW = W-2*M, bottomLimit = H-46, maxH = 300;
    doc.addPage();
    doc.setFillColor.apply(doc, REDD); doc.roundedRect(M, 40, 150, 28, 8, 8, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(255);
    doc.text('ANNEXE PHOTOS', M+75, 58, {align:'center'});
    if(state.client){ doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor.apply(doc, SUB); doc.text(String(state.client), W-M, 58, {align:'right'}); }
    let py = 92;
    state.photos.forEach((p,idx)=>{
      let iw = p.w||availW, ih = p.h||maxH;
      let dw = availW, dh = ih*(dw/iw);
      if(dh > maxH){ dh = maxH; dw = iw*(dh/ih); }
      const blockH = dh + 24;
      if(py + blockH > bottomLimit){
        doc.addPage();
        doc.setFillColor.apply(doc, REDD); doc.roundedRect(M, 40, 182, 28, 8, 8, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(255);
        doc.text('ANNEXE PHOTOS (suite)', M+91, 58, {align:'center'});
        py = 92;
      }
      const ix = M + (availW-dw)/2;
      try{ doc.addImage(p.data, 'JPEG', ix, py, dw, dh); }catch(e){}
      doc.setDrawColor.apply(doc, WARMB); doc.setLineWidth(0.9);
      doc.roundedRect(ix-3, py-3, dw+6, dh+6, 6, 6, 'S');
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor.apply(doc, SUB);
      doc.text('Photo ' + (idx+1), M, py+dh+13);
      py += dh + 28;
    });
  }

  // Pied de page légal (mention obligatoire — sur chaque page, annexes incluses)
  drawLegalFooter(doc);

  const fname = 'Rapport intervention LOXAM Module - ' + ((state.client||'client').trim().replace(/[\\/:*?"<>|—–]/g,'-').replace(/\s+/g,' ').trim() || 'client') + '.pdf';
  await deliverPDF(doc, fname);
  showToast('Rapport généré ✓');
}

/* ===== Chargement robuste de jsPDF ===== */
function loadScript(src){
  return new Promise((resolve, reject)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = ()=>reject(new Error('load '+src));
    document.head.appendChild(s);
  });
}
async function ensureJsPDF(){
  const pick = ()=> (window.jspdf && window.jspdf.jsPDF) || window.jsPDF || null;
  if(pick()) return pick();
  try{ await loadScript('jspdf.umd.min.js'); }catch(e){}
  if(pick()) return pick();
  try{ await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'); }catch(e){}
  return pick();
}

/* ===== Livraison PDF robuste (mobile inclus) ===== */
async function deliverPDF(doc, fname){
  const blob = doc.output('blob');
  const file = new File([blob], fname, {type:'application/pdf'});
  try{
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:fname});
      return;
    }
  }catch(e){ /* annulé ou non supporté */ }
  const url = URL.createObjectURL(blob);
  const a = el('a',{href:url, download:fname});
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>{ try{ window.open(url, '_blank'); }catch(e){} }, 400);
  setTimeout(()=>URL.revokeObjectURL(url), 8000);
}

/* ===== Init ===== */
load(); render();
document.getElementById('pdfBtn').addEventListener('click', ()=>{ generateRapportPDF().catch(e=>showToast('Erreur : '+(e.message||e))); });
document.getElementById('saveBtn').addEventListener('click', ()=>{ save(); showToast('Enregistré ✓'); });

const resetModal = document.getElementById('resetModal');
document.getElementById('resetBtn').addEventListener('click', ()=> resetModal.classList.add('show'));
document.getElementById('resetCancel').addEventListener('click', ()=> resetModal.classList.remove('show'));
document.getElementById('resetConfirm').addEventListener('click', ()=>{ localStorage.removeItem(STORAGE_KEY); location.reload(); });

/* ===== Service worker ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
